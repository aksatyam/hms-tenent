// ─── APP ───
const App = () => {
  const [role, setRole] = useState('L5');
  const [mod, setMod] = useState('M01');
  const [screen, setScreen] = useState('Patient Registration');

  const nav = useCallback((m, s) => { setMod(m); setScreen(s); }, []);

  const renderScreen = () => {
    // Check screen map first
    if (SCREEN_MAP[mod] && SCREEN_MAP[mod][screen]) {
      const Comp = SCREEN_MAP[mod][screen];
      return <Comp nav={nav} />;
    }
    // Cross-cutting screens
    if (mod === 'LOGIN') return <LoginScreen nav={nav} />;
    if (mod === 'RBAC') return <RBACScreen nav={nav} />;
    if (mod === 'KAFKA') return <KafkaScreen nav={nav} />;
    // Module placeholders
    const modDef = MODULES.find(m => m.id === mod);
    if (modDef) {
      return <PlaceholderScreen title={screen} module={`${modDef.id} ${modDef.label}`} roleIds={modDef.roles.slice(0,3)} />;
    }
    return <div>Screen not found</div>;
  };

  return (
    <div>
      <Sidebar activeModule={mod} activeScreen={screen} onNav={nav} currentRole={role} />
      <div className="main">
        <Topbar currentRole={role} onRoleChange={setRole} activeModule={mod} activeScreen={screen} />
        <div className="p-6">{renderScreen()}</div>
      </div>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
